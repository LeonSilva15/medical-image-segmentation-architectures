name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          cache-dependency-glob: "uv.lock"

      - name: Validate references
        run: uv run --locked --python 3.11 python scripts/validate_references.py

      - name: Validate architecture metadata
        run: uv run --locked --python 3.11 python scripts/validate_architecture_metadata.py

      - name: Lint
        run: uv run --locked --python 3.11 ruff check .

      - name: Type check
        run: uv run --locked --python 3.11 mypy src scripts demos tests

      - name: Test
        run: uv run --locked --python 3.11 pytest

      - name: Build docs
        run: uv run --locked --python 3.11 --group docs mkdocs build --strict
