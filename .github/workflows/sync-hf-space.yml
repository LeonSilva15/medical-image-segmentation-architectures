name: Sync U-Net demo to Hugging Face Space

on:
  push:
    branches:
      - main
    paths:
      - "spaces/unet-demo/**"
      - "src/**"
      - "pyproject.toml"
      - "uv.lock"
      - "poetry.lock"
      - "requirements*.txt"
      - ".github/workflows/sync-hf-space.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hf-space-unet-demo
  cancel-in-progress: true

jobs:
  sync:
    name: Sync Space files
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Pin Space package dependency to this commit
        env:
          SOURCE_COMMIT: ${{ github.sha }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          space_dir = Path("spaces/unet-demo")
          requirements_path = space_dir / "requirements.txt"
          source_commit = os.environ["SOURCE_COMMIT"]
          requirements = requirements_path.read_text(encoding="utf-8")
          requirements = requirements.replace(
              "medical-image-segmentation-architectures.git@main",
              f"medical-image-segmentation-architectures.git@{source_commit}",
          )
          requirements_path.write_text(requirements, encoding="utf-8")
          (space_dir / "SOURCE_COMMIT").write_text(f"{source_commit}\n", encoding="utf-8")
          PY

      - name: Sync to Hugging Face Space
        uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: ${{ github.repository }}
          huggingface_repo_id: LeonSilva15/unet-medseg-demo
          repo_type: space
          space_sdk: gradio
          subdirectory: spaces/unet-demo
          hf_token: ${{ secrets.HF_TOKEN }}
