    paper_links:
      - kind: arxiv
        label: arXiv
        url: https://arxiv.org/abs/1802.06955
    modification: Replaces U-Net's plain double-convolution blocks with recurrent residual blocks.
    technical_summary: >
      R2U-Net keeps the U-Net encoder-decoder layout while using Recurrent
      Residual Convolutional blocks so each scale can accumulate context across
      recurrent steps and use residual connections for optimization.
    understandable_summary: >
      R2U-Net shows how recurrence and residual shortcuts can strengthen the
      feature blocks inside a U-Net-style segmentation model.
