architectures:
  - id: fcn
    slug: fcn
    name: Fully Convolutional Network
    year: 2015
    family: Dense prediction
    parent: null
    chapter_path: docs/architectures/fcn.md
    paper_title: Fully Convolutional Networks for Semantic Segmentation
    doi: 10.1109/CVPR.2015.7298965
    arxiv: "1411.4038"
    paper_links:
      - kind: doi
        label: DOI
        url: https://doi.org/10.1109/CVPR.2015.7298965
      - kind: arxiv
        label: arXiv
        url: https://arxiv.org/abs/1411.4038
    modification: Converts classification CNNs into dense pixel prediction networks.
    technical_summary: >
      FCN replaces fully connected layers with convolutional layers and upsamples
      coarse feature maps to produce dense segmentation outputs.
    understandable_summary: >
      FCN predicts a class for each pixel instead of one label for the whole image.
    implementation_status: reference-only
    code_path: null
    tests: false
    demo: false

  - id: unet
    slug: unet
    name: U-Net
    year: 2015
    family: U-Net family
    parent: fcn
    chapter_path: docs/architectures/unet.md
    paper_title: "U-Net: Convolutional Networks for Biomedical Image Segmentation"
    doi: 10.1007/978-3-319-24574-4_28
    arxiv: "1505.04597"
    paper_links:
      - kind: doi
        label: DOI
        url: https://doi.org/10.1007/978-3-319-24574-4_28
      - kind: arxiv
        label: arXiv
        url: https://arxiv.org/abs/1505.04597
    modification: Adds a symmetric encoder-decoder with skip connections.
    technical_summary: >
      U-Net combines a contracting path for context with an expanding path for
      localization, using skip connections to restore fine spatial detail.
    understandable_summary: >
      U-Net sees broad context while preserving fine boundaries, which makes it a
      strong baseline for biomedical segmentation.
    implementation_status: implemented
    code_path: src/medseg_architectures/models/unet.py
    tests: true
    demo: true

  - id: deeplabv3plus
