    paper_title: "Cellpose: a generalist algorithm for cellular segmentation"
    authors:
      - Carsen Stringer
      - Tim Wang
      - Michalis Michaelos
      - Marius Pachitariu
    venue: Nature Methods, 2021
    doi: "10.1038/s41592-020-01018-x"
    pmid: "33318659"
    arxiv: null
    paper_links:
      - kind: doi
        label: DOI
        url: https://doi.org/10.1038/s41592-020-01018-x
    official_code: https://github.com/MouseLand/cellpose
    versions:
      cellpose_2:
        paper_title: "Cellpose 2.0: how to train your own model"
        doi: "10.1038/s41592-022-01663-4"
        year: 2022
      cellpose_3:
        paper_title: "Cellpose3: one-click image restoration for improved segmentation"
        doi: "10.1038/s41592-025-02604-7"
        year: 2025
    modification: >-
      Replaces shape-based instance representation such as polygons or
      polyhedra with a physics-inspired flow-field representation derived from
      the heat diffusion equation. Introduces a no-annotation-free 3D extension
      that reuses a 2D model across orthogonal planes, removing the need for 3D
      instance labels during training.
    technical_summary: >
      Cellpose trains a U-Net to predict, at every pixel, a 2D flow vector
      representing the pre-computed solution of the heat diffusion equation
      applied to ground-truth instance masks, with a heat source at each object
      centre. A second output head predicts a cell probability map. At
      inference, predicted flows are integrated by a gradient tracking step that
      clusters pixels whose trajectories converge to the same fixed point,
      yielding instance masks without an explicit shape prior. The 3D extension
      processes all three orthogonal planes, XY, XZ, and YZ, with the same 2D
      model and averages the six resulting gradient components to produce full
      3D vector gradients, enabling 3D instance segmentation without 3D-labelled
      training data.
    understandable_summary: >
      Cellpose teaches a network to predict, for every pixel, which direction to
      flow to reach its object's centre. At test time pixels are grouped by
      following those flows; pixels that end up at the same centre belong to the
      same object. The 3D extension reuses the 2D model on all three slice
      orientations and combines the results, so it works in 3D without any 3D
      ground truth.
    limitations: >
      Flow field integration can fail for very elongated objects. The 3D
      extension assumes the object appears coherently in all three orthogonal
      planes, which breaks down for objects with extreme aspect ratios.
      Performance on densely packed elongated structures is not well
      characterised in the original paper.
    implementation_status: reference-only
    code_path: null
    tests: false
    demo: false

  - id: wnet3d
    slug: wnet3d
    name: WNet3D
    year: 2025
    family: instance-segmentation
    dimensionality: 3d
    modalities:
      - microscopy
    segmentation_task: self-supervised-region
    output_type: soft-region-map
    prompt_type:
      - none
    supervision_type: self-supervised-pretraining
    parent: cellpose
    chapter_path: docs/architectures/wnet3d.md
    paper_title: "CellSeg3D: self-supervised 3D cell segmentation for fluorescence microscopy"
    authors:
      - Cyril Achard
      - Timokleia Kousi
      - Markus Frey
      - Maxime Vidal
      - Yves Paychere
      - Colin Hofmann
      - Asim Iqbal
      - Sebastien B Hausmann
      - Stéphane Pagès
      - Mackenzie Weygandt Mathis
    venue: eLife, 2025
    doi: "10.7554/eLife.99848"
    arxiv: null
    paper_links:
      - kind: doi
        label: DOI
        url: https://doi.org/10.7554/eLife.99848
    official_code: https://github.com/AdaptiveMotorControlLab/CellSeg3D
    modification: >-
      Replaces supervised training with a self-supervised NCut plus
      reconstruction objective, removing the requirement for manually annotated
      3D instance masks. Introduces a W-shaped dual-U-Net architecture where
      the segmentation from the first U-Net is used as input to the second
      U-Net that reconstructs the original image.
    technical_summary: >
      WNet3D is a self-supervised segmentation architecture consisting of two
      coupled U-Net encoders arranged in a W-shape: the first encodes the input
      volume into a soft segmentation map, and the second reconstructs the
      original volume from that map. The soft cut loss, NCut, encourages spatial
      consistency in the segmentation by penalizing cuts through regions of
      similar intensity, while the reconstruction loss prevents trivial
      solutions, such as assigning all voxels to one segment. The model is
      pretrained on unlabelled 3D fluorescence volumes and can be paired with
      supervised fine-tuning when corrected labels become available. Instance
      labels are derived post-hoc
      from the semantic output using Voronoi-Otsu labelling or
      connected-component watershed.
    understandable_summary: >
      WNet3D learns region structure from unlabelled 3D microscopy images by
      training two U-Nets: one that segments, and one that reconstructs the
      original image from the segmentation. The reconstruction objective forces
      the segmentation to be meaningful rather than arbitrary. After
      self-supervised training, its outputs can be inspected, corrected, and
      used in a supervised follow-up workflow.
    limitations: >
      The NCut loss requires a differentiable brightness-affinity graph that is
      computed on image patches, making training memory-intensive for large 3D
      volumes. The architecture assumes objects are distinguishable by local
      intensity patterns; it struggles when objects and background have similar
      fluorescence intensity profiles. Post-hoc instance extraction,
      Voronoi-Otsu, inherits the assumption that object centres are
      identifiable as local intensity maxima, which may not hold for uniformly
      labelled object shafts.
    implementation_status: reference-only
    code_path: null
    tests: false
    demo: false

