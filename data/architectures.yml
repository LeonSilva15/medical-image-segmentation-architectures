    paper_links:
      - kind: doi
        label: DOI
        url: https://doi.org/10.1007/978-3-030-01234-2_49
      - kind: arxiv
        label: arXiv
        url: https://arxiv.org/abs/1802.02611
    modification: Combines atrous spatial pyramid pooling with a lightweight decoder.
    technical_summary: >
      DeepLabv3+ uses atrous convolution and ASPP to gather multi-scale context,
      then adds a decoder path that refines coarse segmentation results with
      lower-level spatial features.
    understandable_summary: >
      DeepLabv3+ is a general segmentation model that teaches how dilated
      convolutions, multi-scale context, and decoder refinement can work together.
    implementation_status: reference-only
    code_path: null
    tests: false
    demo: false

