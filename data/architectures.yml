      - kind: arxiv
        label: arXiv
        url: https://arxiv.org/abs/1606.06650
    modification: Extends U-Net from 2D images to dense 3D volume segmentation.
    technical_summary: >
      3D U-Net replaces 2D U-Net operations with 3D counterparts so the
      encoder-decoder can process volumetric patches and learn dense voxel
      predictions from sparse annotations.
    understandable_summary: >
      3D U-Net is the direct volumetric version of U-Net: it segments a volume
      by looking across slices instead of treating each slice independently.
    implementation_status: reference-only
    code_path: null
    tests: false
    demo: false

