site_name: Medical Image Segmentation Architectures
site_description: An interactive book for learning medical image segmentation architectures.
site_url: https://leonsilva15.github.io/medical-image-segmentation-architectures/
repo_url: https://github.com/LeonSilva15/medical-image-segmentation-architectures
repo_name: LeonSilva15/medical-image-segmentation-architectures

theme:
  name: material
  features:
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - search.highlight
    - search.suggest

plugins:
  - search

extra_css:
  - assets/stylesheets/diagram-viewer.css

extra_javascript:
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js
  - assets/javascripts/diagram-viewer.js

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format

nav:
  - Start Here: index.md
  - Foundations:
      - What Is Segmentation?: foundations/what-is-segmentation.md
      - How To Read An Architecture: foundations/how-to-read-an-architecture.md
      - Training And Evaluation Basics: foundations/training-and-evaluation-basics.md
  - Evolution:
      - Architecture Lineage: evolution/lineage.md
  - Architectures:
      - Architecture Index: architectures/index.md
      - Architecture Selection Guide: architectures/selection-guide.md
      - FCN: architectures/fcn.md
      - DeepLabv3+: architectures/deeplabv3plus.md
      - U-Net:
          - Overview: architectures/unet.md
          - Full Code: architectures/unet/code.md
          - Cookbook: architectures/unet/cookbook.md
          - Live Example: architectures/unet/live-example.md
      - 3D U-Net: architectures/3d-unet.md
      - V-Net: architectures/vnet.md
      - Residual U-Net / ResUNet-style variants: architectures/resunet-style-variants.md
      - U-Net++: architectures/unetpp.md
      - Attention U-Net: architectures/attention-unet.md
      - nnU-Net: architectures/nnunet.md
      - TransUNet: architectures/transunet.md
      - Swin-Unet: architectures/swin-unet.md
      - UNETR: architectures/unetr.md
      - Swin UNETR: architectures/swin-unetr.md
      - MedSAM: architectures/medsam.md
      - SAM-Med2D: architectures/sam-med2d.md
      - MedSAM2: architectures/medsam2.md
  - Appendix:
      - General Segmentation Context: appendix/general-segmentation-context.md
  - Contributing:
      - Overview: contributing/index.md
      - Adding An Architecture: contributing/adding-an-architecture.md
      - Metadata Conventions: contributing/metadata-conventions.md
      - Architecture Page Template: contributing/architecture-template.md
      - Architecture Checklist: contributing/architecture-checklist.md
      - Code Change Checklist: contributing/code-change-checklist.md
  - References: references.md
